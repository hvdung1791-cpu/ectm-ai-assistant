<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECTM AI Assistant</title>
  <style>
    body { font-family: Arial; margin:0; background:#f3f6fb; color:#1f2937; }
    header { background:#0f172a; color:white; padding:20px; }
    .container { padding:20px; max-width:1100px; margin:auto; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:15px; }
    .card { background:white; padding:18px; border-radius:14px; box-shadow:0 3px 10px #0001; }
    input, textarea, select, button { padding:10px; margin:5px 0; width:100%; border-radius:8px; border:1px solid #ddd; }
    button { background:#2563eb; color:white; cursor:pointer; border:none; }
    .task { background:#eef2ff; padding:10px; margin-top:8px; border-radius:8px; }
  </style>
</head>
<body>

<header>
  <h1>🤖 ECTM AI Assistant</h1>
  <p>Trợ lý quản lý công việc hằng ngày cho anh Dũng</p>
</header>

<div class="container">
  <div class="grid">
    <div class="card">
      <h3>📋 Công việc hôm nay</h3>
      <input id="taskInput" placeholder="Nhập việc cần làm..." />
      <select id="priority">
        <option>Ưu tiên cao</option>
        <option>Ưu tiên vừa</option>
        <option>Ưu tiên thấp</option>
      </select>
      <button onclick="addTask()">Thêm việc</button>
      <div id="taskList"></div>
    </div>

    <div class="card">
      <h3>👥 Khách hàng cần xử lý</h3>
      <textarea placeholder="Ví dụ: Gọi khách A, gửi báo giá Schneider..."></textarea>
    </div>

    <div class="card">
      <h3>📦 Đơn hàng</h3>
      <textarea placeholder="Đơn đang báo giá, đơn chờ giao, đơn cần theo dõi..."></textarea>
    </div>

    <div class="card">
      <h3>💰 Công nợ</h3>
      <textarea placeholder="Khách cần thu tiền, hạn thanh toán..."></textarea>
    </div>
  </div>

  <div class="card" style="margin-top:20px">
    <h3>🤖 Ghi chú cho AI</h3>
    <textarea placeholder="Anh ghi việc phát sinh ở đây, sau này em sẽ nâng cấp để AI tự sắp xếp và nhắc việc."></textarea>
  </div>
</div>

<script>
function addTask() {
  const task = document.getElementById("taskInput").value;
  const priority = document.getElementById("priority").value;
  if (!task) return;

  const div = document.createElement("div");
  div.className = "task";
  div.innerHTML = "✅ " + task + "<br><small>" + priority + "</small>";

  document.getElementById("taskList").appendChild(div);
  document.getElementById("taskInput").value = "";
}
</script>

</body>
</html>
