<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECTM AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🤖 ECTM AI</h1>
    <p>Trợ lý AI quản lý công việc</p>
</header>

<main>

<div class="card">
    <h2>Thêm công việc</h2>

    <input
        id="taskInput"
        type="text"
        placeholder="Nhập công việc..."
    >

    <select id="priority">
        <option>Cao</option>
        <option>Trung bình</option>
        <option>Thấp</option>
    </select>

    <button onclick="addTask()">
        Lưu công việc
    </button>
</div>

<div class="card">
    <h2>Danh sách công việc</h2>

    <ul id="taskList">

    </ul>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
